name: Gaffer validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate routing contracts
        run: node scripts/validate.mjs
      - name: Check generated agents
        run: node scripts/build-agents.mjs --check
      - name: Run admission load canary
        run: node --expose-gc scripts/load-canary.mjs
